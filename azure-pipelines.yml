trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  TF_VERSION: '1.5.7'

steps:

- checkout: self

- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: $(TF_VERSION)

- task: AzureCLI@2
  displayName: Terraform Init
  inputs:
    azureSubscription: 'azure-epicbook-sc'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform init

- task: AzureCLI@2
  displayName: Terraform Plan
  inputs:
    azureSubscription: 'azure-epicbook-sc'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform plan

- task: AzureCLI@2
  displayName: Terraform Apply
  inputs:
    azureSubscription: 'azure-epicbook-sc'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform apply -auto-approve